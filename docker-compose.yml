version: '3.8'

services:
  # ── Backend (FastAPI) ──────────────────────────────────
  backend:
    build:
      context: ./documind
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./documind/.env
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Next.js) ─────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

  # ── Database (Postgres) ────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=documind
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
